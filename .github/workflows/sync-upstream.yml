name: Sync upstream main

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-main-updated]

permissions:
  contents: write
  workflows: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'bapxmediahub/bapXphpAiBackend'
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main from upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api --method POST
          "repos/${GITHUB_REPOSITORY}/merge-upstream"
          --field branch=main

      - name: Fallback - gh repo sync on merge-upstream failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh repo sync "${GITHUB_REPOSITORY}" --branch main
