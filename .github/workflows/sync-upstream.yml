name: Sync upstream main

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-main-updated]

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository != 'bapXai/auraedu'
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main from upstream
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/merge-upstream" \
            --data '{"branch":"main"}'

      - name: Fallback - merge upstream with plain Git
        if: failure()
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git remote add upstream "https://github.com/bapXai/auraedu.git"
          git fetch upstream main
          git checkout main
          git merge --ff-only upstream/main
          git push origin main
