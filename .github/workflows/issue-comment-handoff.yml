name: Issue comment handoff

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

concurrency:
  group: handoff-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route:
    if: github.actor != 'handoff-ai-bot' && endsWith(github.repository, 'auraedu') && (startsWith(github.event.comment.body, '/handoff ') || startsWith(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Parse handoff target
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -q '^/handoff '; then
            TARGET=$(echo "$COMMENT" | sed 's/\/handoff //')
          else
            TARGET="reviewer"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Handoff requested: issue #${{ github.event.issue.number }} → $TARGET"
      - name: Route handoff
        run: |
          ISSUE="${{ github.event.issue.number }}"
          TARGET="${{ steps.parse.outputs.target }}"
          EVENT_FILE=".agents/handoffs/events/${ISSUE}.json"
          ACTIVE_FILE=".agents/handoffs/active/current.json"
          mkdir -p .agents/handoffs/events .agents/handoffs/active

          if [ -f "$EVENT_FILE" ]; then
            cat "$EVENT_FILE" | jq --arg role "$TARGET" \
              '.workflow.current_role = $role | .workflow.next_role = (if $role == "cto" then "worker" elif $role == "worker" then "reviewer" else "cto" end)' \
              > "$ACTIVE_FILE"
          else
            cat > "$ACTIVE_FILE" << EOF
            {
              "event_type": "issue_comment.created",
              "issue": $ISSUE,
              "actor": "${{ github.actor }}",
              "workflow": {
                "current_role": "$TARGET",
                "next_role": "$(if [ "$TARGET" = "cto" ]; then echo worker; elif [ "$TARGET" = "worker" ]; then echo reviewer; else echo cto; fi)",
                "sequence": ["cto", "worker", "reviewer", "cto"]
              },
              "payload": {
                "comment": $(echo '${{ github.event.comment.body }}' | jq -Rs .)
              },
              "repository": {
                "owner": "${{ github.repository_owner }}",
                "name": "${{ github.event.repository.name }}"
              },
              "objectives": [{"id": "OBJ-${ISSUE}-1", "status": "in_progress", "evidence": [], "browser_evidence": [], "unresolved": []}],
              "telemetry": {
                "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                "handoffs_completed": 1
              }
            }
            EOF
          fi

          jq empty "$ACTIVE_FILE" && echo "Valid handoff routed to: $TARGET"
      - name: Commit handoff
        run: |
          git config user.name "handoff-ai-bot"
          git config user.email "handoff-ai-bot@bapXaura.action"
          git add .agents/handoffs/
          git diff --cached --quiet || git commit -m "auto: handoff route to ${{ steps.parse.outputs.target }} for issue #${{ github.event.issue.number }}"
          for i in 1 2 3; do
            git pull --rebase origin "$GITHUB_REF_NAME" 2>/dev/null || true
            if git push origin "HEAD:$GITHUB_REF_NAME" 2>/dev/null; then exit 0; fi
            sleep 2
          done
          git pull --rebase origin "$GITHUB_REF_NAME" 2>/dev/null || true
          git push --force-with-lease origin "HEAD:$GITHUB_REF_NAME"
      - name: Confirm handoff
        uses: actions/github-script@v7
        env:
          TARGET: ${{ steps.parse.outputs.target }}
        with:
          script: |
            const role = process.env.TARGET;
            const hdr = "<!-- bapx-handoff\n" + JSON.stringify({
              schema_version: "1.0",
              event_id: "EVT-HO-" + context.issue.number,
              workflow_id: "WF-ISSUE-" + context.issue.number,
              issue: context.issue.number,
              from_role: role === "worker" ? "cto" : role === "reviewer" ? "worker" : "previous",
              to_role: role,
              head_sha: "${{ github.sha }}",
              status: "routed",
              owner: { github: "bapXai", notify: false, reason: null }
            }, null, 2) + "\n-->";
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: hdr + `\n## Handoff routed to **${role}**

            | Role | Status |
            |------|--------|
            | Current | ${role} |
            | Next | awaiting completion |

            Active handoff: \`.agents/handoffs/active/current.json\``
            });
