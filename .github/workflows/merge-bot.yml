name: Merge Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to merge
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: merge-bot-${{ github.event.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  merge:
    if: endsWith(github.repository, 'auraedu')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.number
              || context.payload.check_run?.pull_requests?.[0]?.number
              || parseInt('${{ inputs.pr_number }}');
            if (!prNumber) { console.log('No PR number'); return; }

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber
            });
            if (pr.merged) { console.log(`PR #${prNumber} already merged`); return; }
            if (pr.state !== 'open') { console.log(`PR #${prNumber} is not open`); return; }

            const { data: checks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: pr.head.sha
            });
            const checkRuns = checks.check_runs || [];
            const REQUIRED_CHECKS = ['review', 'validate'];
            const missingRequired = REQUIRED_CHECKS.filter(
              name => !checkRuns.some(c => (c.name === name || c.name.startsWith(name)) && c.status === 'completed')
            );
            if (missingRequired.length > 0) {
              console.log(`Waiting: required checks not yet completed: ${missingRequired.join(', ')}`);
              return;
            }
            const failed = checkRuns.filter(c => c.conclusion === 'failure' || c.conclusion === 'cancelled' || c.conclusion === 'timed_out');
            const pending = checkRuns.filter(c => c.status !== 'completed');
            const codeRabbit = checkRuns.filter(c => c.name === 'CodeRabbit' || c.app?.slug === 'coderabbit');
            const nonBlocking = failed.filter(c => c.app?.slug === 'coderabbit' || c.name === 'CodeRabbit' || c.name === 'Sourcery review');

            if (nonBlocking.length < failed.length) {
              console.log(`Merge blocked: ${failed.length - nonBlocking.length} non-optional check(s) failed`);
              for (const c of failed) {
                if (!nonBlocking.includes(c)) console.log(`  - ${c.name}: ${c.conclusion}`);
              }
              return;
            }
            if (pending.length > 0) {
              console.log(`Waiting: ${pending.length} check(s) still running`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                ...context.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `Merge PR #${prNumber}: ${pr.title}`
              });
              console.log(`Merged PR #${prNumber}`);
            } catch (e) {
              console.log(`Merge failed: ${e.message}`);
            }

      - name: Post merge handoff
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.number || inputs.pr_number }}
        with:
          script: |
            const pr = parseInt(process.env.PR_NUMBER);
            if (!pr) return;
            const hdr = "<!-- bapx-handoff\n" + JSON.stringify({
              schema_version: "1.0",
              event_id: "EVT-MERGE-" + pr,
              workflow_id: "WF-PR-" + pr,
              pull_request: pr,
              from_role: "merge_bot",
              to_role: "deployment",
              head_sha: "${{ github.sha }}",
              status: "merged",
              owner: { github: "bapXai", notify: false, reason: null }
            }, null, 2) + "\n-->";
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr,
              body: hdr + "\n## Merge Bot: PR merged\n**Status:** Merged\n**Next:** Deployment\n\n*Auto-merge complete — next: deployment verification*"
            });
