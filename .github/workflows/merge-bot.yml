name: Merge Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to merge
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: merge-bot-${{ github.event.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  merge:
    if: endsWith(github.repository, 'auraedu')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.number
              || context.payload.check_run?.pull_requests?.[0]?.number
              || parseInt('${{ inputs.pr_number }}');
            if (!prNumber) { console.log('No PR number'); return; }

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber
            });
            if (pr.merged) { console.log(`PR #${prNumber} already merged`); return; }
            if (pr.state !== 'open') { console.log(`PR #${prNumber} is not open`); return; }

            const { data: checks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: pr.head.sha
            });
            const checkRuns = checks.check_runs || [];
            const failed = checkRuns.filter(c => c.conclusion === 'failure' || c.conclusion === 'cancelled' || c.conclusion === 'timed_out');
            const pending = checkRuns.filter(c => c.status !== 'completed');
            const codeRabbit = checkRuns.filter(c => c.name === 'CodeRabbit' || c.app?.slug === 'coderabbit');
            const nonBlocking = failed.filter(c => c.app?.slug === 'coderabbit' || c.name === 'CodeRabbit' || c.name === 'Sourcery review');

            if (nonBlocking.length < failed.length) {
              console.log(`Merge blocked: ${failed.length - nonBlocking.length} non-optional check(s) failed`);
              for (const c of failed) {
                if (!nonBlocking.includes(c)) console.log(`  - ${c.name}: ${c.conclusion}`);
              }
              return;
            }
            if (pending.length > 0) {
              console.log(`Waiting: ${pending.length} check(s) still running`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                ...context.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `Merge PR #${prNumber}: ${pr.title}`
              });
              console.log(`Merged PR #${prNumber}`);
            } catch (e) {
              console.log(`Merge failed: ${e.message}`);
            }

      - name: Update handoff to next role
        run: |
          ISSUE="${{ github.event.number || inputs.pr_number }}"
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" repo
          cd repo
          git config user.name "merge-bot"
          git config user.email "merge-bot@auraedu.action"
          git checkout main
          ACTIVE=".agents/handoffs/active/current.json"
          EVENTS=".agents/handoffs/events"
          mkdir -p "$EVENTS"
          if [ -f "$ACTIVE" ]; then
            jq '.workflow.current_role = "merge_bot" | .workflow.next_role = "deployment"' "$ACTIVE" > "${ACTIVE}.tmp" && mv "${ACTIVE}.tmp" "$ACTIVE"
          fi
          git add .agents/handoffs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: merge bot completed for issue/PR #${ISSUE}"
          for i in 1 2 3; do
            git pull --rebase origin main 2>/dev/null || true
            if git push origin main 2>/dev/null; then exit 0; fi
            sleep 2
          done
          git push --force-with-lease origin main
